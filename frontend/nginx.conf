server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for fast delivery over slow campus networks
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed assets are immutable — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must always revalidate so deployments are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — client-side router handles the rest.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
