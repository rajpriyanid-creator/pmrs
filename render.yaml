# Render Infrastructure Blueprint for PRMS (Project Review Management System)
# Repository: https://github.com/rajpriyanid-creator/pmrs.git

services:
  # 1. Backend Express Web Service
  - type: web
    name: prms-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Provide your MongoDB Atlas Connection String in Render Dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: CORS_ORIGIN
        value: https://prms-frontend.onrender.com
      - key: COOKIE_SECURE
        value: true
      - key: ADMIN_SEED_USERNAME
        value: admin
      - key: ADMIN_SEED_PASSWORD
        value: ChangeMe123!

  # 2. Frontend React / Vite Static Site
  - type: web
    name: prms-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://prms-backend.onrender.com/api
