# Render Infrastructure Blueprint for PRMS (Project Review Management System)
# Repository: https://github.com/rajpriyanid-creator/pmrs.git

services:
  # 1. Backend Express Web Service
  - type: web
    name: prms-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        value: "mongodb+srv://hellorajpriyan_db_user:rI0BW4H1JwCna3Zb@dept.cgammqj.mongodb.net/?appName=dept"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "7"
      - key: CORS_ORIGIN
        value: https://prms-frontend-3zgc.onrender.com
      - key: COOKIE_SECURE
        value: "true"

  # 2. Frontend React / Vite Static Site
  - type: web
    name: prms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://prms-backend-frd7.onrender.com/api
